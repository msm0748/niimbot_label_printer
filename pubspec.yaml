name: flutter_niimbot
description: An unofficial Flutter package for rendering and printing labels with NIIMBOT Bluetooth label printers. Currently supports D11H only.
version: 0.1.0-dev.3
repository: https://github.com/msm0748/niimbot_label_printer
issue_tracker: https://github.com/msm0748/niimbot_label_printer/issues
topics:
  - bluetooth
  - ble
  - label-printer
  - niimbot

environment:
  sdk: ^3.11.5
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_reactive_ble: ^5.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
